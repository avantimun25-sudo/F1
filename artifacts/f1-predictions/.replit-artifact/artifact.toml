kind = "web"
previewPath = "/"
title = "F1 Championship Predictions"
version = "1.0.0"
id = "artifacts/f1-predictions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23247

[services.development]
run = "pnpm --filter @workspace/f1-predictions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/f1-predictions", "run", "build" ]
publicDir = "artifacts/f1-predictions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23247"
BASE_PATH = "/"
